# Paper encoder pretraining config
model:
  backbone_name: allenai/specter2_base
  hidden_dim: 768
  proj_dim: 256
  use_engram: true
  memory_dim: 512
  num_buckets: 300000

engram:
  max_ngram: 3
  num_heads_per_ngram: 4
  conv_kernel_size: 3

train:
  lr: 2.0e-5
  batch_size: 16
  epochs: 5
  weight_decay: 0.01
  warmup_steps: 500
  gradient_accumulation_steps: 4
  bf16: true
  gradient_checkpointing: true

loss:
  contrastive_weight: 0.5
  citation_weight: 0.3
  year_order_weight: 0.2
  tau: 0.05

data:
  pairs_path: data/processed/positive_pairs.jsonl
  negatives_path: data/processed/negative_pairs.jsonl
  num_negatives: 7
